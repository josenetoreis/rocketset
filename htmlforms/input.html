<form>
  <input 
  placeholder="coloque seu nome"
  autofocus
  autocomplete="name"
  type="text" name="nome">
</form>

<form action="">
  <input type="number" name="idade" min="0" max="120" required>
  <button type="submit">submit</button>
</form>

<form action="">
  <input type="email" name="email" required name="email"
  placeholder="coloque seu email"
  autocomplete="email"
  pattern=".@rocketseat\.com">
  <button type="submit">submit</button>
</form>
